name: Publish Android

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ vars.ANDROID_RELEASE_VERSION }}"
          fi
          VERSION="${VERSION#v}"
          if [[ -z "$VERSION" ]]; then
            echo "Release version is empty." >&2
            exit 1
          fi
          echo "ANDROID_RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Publish to Maven Central
        working-directory: ./android
        env:
          ORG_GRADLE_PROJECT_releaseVersion: ${{ env.ANDROID_RELEASE_VERSION }}
          ORG_GRADLE_PROJECT_ossrhUsername: ${{ secrets.ANDROID_OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_ossrhPassword: ${{ secrets.ANDROID_OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_sonatypeStagingProfileId: ${{ secrets.ANDROID_SONATYPE_STAGING_PROFILE_ID }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.ANDROID_SIGNING_SECRET_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.ANDROID_SIGNING_PASSWORD }}
        run: ./gradlew :live-update-provider:publishReleasePublicationToSonatypeRepository closeAndReleaseSonatypeStagingRepository
